name = "sebpay-proxy"
main = "sebpay-proxy.js"
compatibility_date = "2024-01-01"

# Environment variables
# These should be set as secrets in Cloudflare Workers dashboard
# Use: wrangler secret put SEBPAY_API_KEY
# Use: wrangler secret put SEBPAY_SECRET_KEY
# Use: wrangler secret put LEEKPAY_SECRET_KEY

[vars]
# Public variables (if any)

# Production environment
[env.production]
name = "sebpay-proxy-prod"

# Development environment
[env.development]
name = "sebpay-proxy-dev"
